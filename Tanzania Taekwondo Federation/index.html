<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="description" content="Tanzania Taekwondo Federation - Official Coming Soon Page" />
  <meta name="author" content="Tanzania Taekwondo Federation" />
  <title>Tanzania Taekwondo Federation | Coming Soon</title>

  <link rel="icon" type="image/x-icon" href="assets/tkd.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />

  <!-- Icons -->
  <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Your stylesheet -->
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>

  <!-- Background -->
  <video class="bg-video" playsinline autoplay muted loop>
    <source src="assets/mp4/bg3.mp4" type="video/mp4" />
  </video>

  <main class="taekwondo-hero">
    <div class="hero-center">

      <!-- Logo + Federation Name -->
      <div class="hero-logo-wrap brand-pill">
        <img src="assets/img/tkd.png" alt="Tanzania Taekwondo Federation Logo" class="hero-logo" />

        <div class="hero-brand-text">
          <div class="brand-line-1">TANZANIA TAEKWONDO</div>
          <div class="brand-line-2">FEDERATION</div>
        </div>
      </div>

      <!-- Titles -->
      <p class="hero-kicker">Coming Soon</p>
      <h1 class="hero-main-title">Website Launching Soon</h1>
     

      <!-- Countdown -->
      <div class="countdown-wrap" id="countdown">
        <div class="countdown-item">
          <span class="count-value" id="days">24</span>
          <span class="count-label">Days</span>
        </div>
        <div class="countdown-item">
          <span class="count-value" id="hours">10</span>
          <span class="count-label">Hours</span>
        </div>
        <div class="countdown-item">
          <span class="count-value" id="minutes">38</span>
          <span class="count-label">Minutes</span>
        </div>
        <div class="countdown-item">
          <span class="count-value" id="seconds">05</span>
          <span class="count-label">Seconds</span>
        </div>
      </div>

      <!-- Subscribe -->
      <div class="subscribe-title">Subscribe for Updates</div>

      <form id="contactForm" class="hero-subscribe-form">
        <div class="subscribe-bar">
          <input
            class="form-control hero-email-input"
            id="email"
            type="email"
            placeholder="Enter your email"
            aria-label="Email address"
            data-sb-validations="required,email"
          />
          <button class="btn hero-notify-btn" id="submitButton" type="submit">Notify Me</button>
        </div>
        <div id="message" style="margin-top:10px; font-size:14px; display:none;"></div>

        <div class="invalid-feedback mt-2" data-sb-feedback="email:required">An email is required.</div>
        <div class="invalid-feedback mt-2" data-sb-feedback="email:email">Email is not valid.</div>

        <div class="d-none" id="submitSuccessMessage">
          <div class="text-center mt-3 text-white">
            <div class="fw-bold">You’re on the list! We’ll notify you at launch.</div>
          </div>
        </div>

        <div class="d-none" id="submitErrorMessage">
          <div class="text-center text-danger mt-3">Error sending message! Please try again.</div>
        </div>
      </form>

      <!-- Social -->
      <div class="social-icons-bottom">
        <div class="social-row">
          <a class="social-circle" href="#" target="_blank" aria-label="Facebook">
            <i class="fab fa-facebook-f"></i>
          </a>
          <a class="social-circle" href="#" target="_blank" aria-label="Twitter">
            <i class="fab fa-twitter"></i>
          </a>
          <a class="social-circle" href="https://www.instagram.com/tanzaniataekwondofederationttf?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
          </a>
          <a class="social-circle" href="#" target="_blank" aria-label="YouTube">
            <i class="fab fa-youtube"></i>
          </a>
        </div>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    (function () {
      const launchDate = new Date("June 01, 2026 00:00:00").getTime();

      function updateCountdown() {
        const now = new Date().getTime();
        const distance = launchDate - now;

        if (distance <= 0) {
          document.getElementById("days").textContent = "00";
          document.getElementById("hours").textContent = "00";
          document.getElementById("minutes").textContent = "00";
          document.getElementById("seconds").textContent = "00";
          return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").textContent = String(days).padStart(2, "0");
        document.getElementById("hours").textContent = String(hours).padStart(2, "0");
        document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
        document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");
      }

      updateCountdown();
      setInterval(updateCountdown, 1000);
    })();
  </script>
  <script>
document.getElementById("contactForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;

  try {
    const response = await fetch("https://api.brevo.com/v3/contacts", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "api-key": "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"
      },
      body: JSON.stringify({
        email: email,
        listIds: [3],
        updateEnabled: true
      })
    });

    const messageDiv = document.getElementById("message");

if (response.ok) {
  messageDiv.style.display = "block";
  messageDiv.style.color = "#00ffcc";
  messageDiv.textContent = "✅ You're on the list!";
  document.getElementById("contactForm").reset();
} else {
  const text = await response.text();
  console.log("Brevo error:", response.status, text);

  messageDiv.style.display = "block";
  messageDiv.style.color = "#ff4d4d";
  messageDiv.textContent = "❌ Something went wrong. Try again.";
}
  } catch (error) {
  console.error(error);
  const messageDiv = document.getElementById("message");
  messageDiv.style.display = "block";
  messageDiv.style.color = "#ff4d4d";
  messageDiv.textContent = "❌ Network error. Try again.";
}
});
</script>
</body>
</html>
